@if (link()) {
  <a
    [routerLink]="link()"
    [class]="customClass()"
    class="btn"
    [class.disabled]="disabled()"
    (click)="onClick($event)"
  >
    {{ text() }}
  </a>

} @else {
  <button
  [type]="type()"
  class="btn"
  [class]="customClass()"
  [disabled]="disabled()"
  (click)="onClick($event)">
  {{ text() }}
</button>
}
